<html lang="en" class="dark">

    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Diseño y desarrollo de sitios web modernos, landing pages de alta conversión y tiendas ecommerce rápidas y seguras. Soluciones profesionales hechas a medida para impulsar tu presencia digital y atraer más clientes."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon-portfolio2.png" />

    <meta name="theme-color" content="#0a0a0a" />
    <title>Abrahan Soluciones Digitales</title>
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#E8E8E8');
        } else {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
